# LF-Font 모델 설정
# 자세한 파라미터는 extern/lffont/cfgs/ 참고

model:
  C: 32                  # 기본 채널 수
  n_heads: 4             # Attention head 수
  n_comps: 40            # 컴포넌트(자모) 수
  decompose_type: "naive"  # 자모 분해 방식

inference:
  batch_size: 16
  img_size: 128
  n_ref: 4               # 레퍼런스 글자 수

data:
  ref_chars:             # LF-Font 최적 4글자
    - "갈"
    - "넓"
    - "읽"
    - "좋"

  # DM-Font 28글자를 사용하려면 아래 주석 해제
  # ref_chars:
  #   - "갈" - "넓" - "읽" - "좋" - "밝" - "흙" - "닭" - "삶"
  #   - "젊" - "옭" - "긁" - "뚫" - "얽" - "훑" - "핥" - "굶"
  #   - "잃" - "닳" - "끓" - "떫" - "곬" - "섧" - "헑" - "볶"
  #   - "뒤" - "쥐" - "뢰" - "쾌"
